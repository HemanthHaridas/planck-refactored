<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planck — Log Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg1:       #161b22;
      --bg2:       #1c2128;
      --bg3:       #21262d;
      --border:    #30363d;
      --border2:   #3d444d;
      --text:      #e6edf3;
      --text2:     #7d8590;
      --text3:     #484f58;
      --teal:      #39d0c8;
      --teal-dim:  rgba(57,208,200,0.12);
      --teal-glow: rgba(57,208,200,0.25);
      --orange:    #f0883e;
      --red:       #f85149;
      --green:     #3fb950;
      --blue:      #58a6ff;
      --purple:    #bc8cff;
      --fn-ui:     'IBM Plex Sans', sans-serif;
      --fn-mono:   'IBM Plex Mono', monospace;
    }

    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text);
                 font-family:var(--fn-ui); font-size:13px; }

    #app { display:flex; flex-direction:column; height:100vh; }

    #header {
      display:flex; align-items:center; justify-content:space-between;
      height:48px; padding:0 18px; flex-shrink:0;
      background:var(--bg1); border-bottom:1px solid var(--border);
    }
    .hdr-logo { display:flex; align-items:center; gap:10px; }
    .hdr-atom { font-size:22px; line-height:1; }
    .hdr-name { font-family:var(--fn-mono); font-size:16px; font-weight:600;
                color:var(--teal); letter-spacing:0.05em; }
    .hdr-tag  { font-size:10px; color:var(--text3); letter-spacing:0.12em;
                text-transform:uppercase; font-weight:500; }
    .hdr-right { display:flex; align-items:center; gap:10px; }

    #workspace {
      display:grid;
      grid-template-columns:
        var(--left-panel-width, 240px)
        var(--resize-handle-width, 10px)
        minmax(0, 1fr)
        var(--resize-handle-width, 10px)
        var(--right-panel-width, 276px);
      flex:1; overflow:hidden;
    }

    aside {
      background:var(--bg1); overflow-y:auto; overflow-x:hidden;
      border-right:1px solid var(--border);
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    #panel-results { border-right:none; border-left:1px solid var(--border); }
    #panel-setup { border-right:none; }
    #panel-results { border-left:none; }

    .resize-handle {
      position:relative;
      background:var(--bg);
      cursor:col-resize;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
      transition:background .12s, border-color .12s;
      touch-action:none;
      user-select:none;
    }
    .resize-handle::before {
      content:'';
      position:absolute; top:50%; left:50%;
      width:3px; height:38px; transform:translate(-50%, -50%);
      border-radius:999px;
      background:
        linear-gradient(
          to right,
          var(--text3) 0,
          var(--text3) 1px,
          transparent 1px,
          transparent 2px,
          var(--text3) 2px,
          var(--text3) 3px
        );
      opacity:0.5;
    }
    .resize-handle:hover,
    .resize-handle.active,
    .resize-handle:focus-visible {
      background:var(--teal-dim);
      border-color:var(--teal);
      outline:none;
    }
    .resize-handle:hover::before,
    .resize-handle.active::before,
    .resize-handle:focus-visible::before { opacity:1; }

    .ps { padding:14px 16px; border-bottom:1px solid var(--border); }
    .ps-title {
      font-size:9.5px; font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--text3); margin-bottom:10px;
      display:flex; align-items:center; gap:6px;
    }
    .ps-title::before { content:''; display:block; width:3px; height:3px;
                        background:var(--teal); border-radius:50%; }

    .info-row {
      display:flex; gap:8px; margin:3px 0;
      font-size:10.5px; font-family:var(--fn-mono); line-height:1.6;
    }
    .info-key { color:var(--text3); flex-shrink:0; width:52px; }
    .info-val { color:var(--text); word-break:break-all; }

    #mol-info { margin-top:4px; font-size:10.5px; color:var(--text2); line-height:1.7;
                font-family:var(--fn-mono); }
    #mol-info .chip {
      display:inline-block; background:var(--bg3); border:1px solid var(--border);
      border-radius:3px; padding:1px 6px; margin:1px 2px; font-size:10.5px;
    }

    .badge {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:600;
      border:1px solid; letter-spacing:0.04em; font-family:var(--fn-mono);
    }
    .badge::before { content:''; display:inline-block; width:5px; height:5px; border-radius:50%; }
    .badge-idle    { color:var(--text3);   border-color:var(--border2); }
    .badge-idle::before    { background:var(--text3); }
    .badge-running { color:var(--teal);    border-color:var(--teal);
                     animation:pulse 1.1s ease-in-out infinite; }
    .badge-running::before { background:var(--teal); }
    .badge-done    { color:var(--green);   border-color:var(--green); }
    .badge-done::before    { background:var(--green); }
    .badge-error   { color:var(--red);     border-color:var(--red); }
    .badge-error::before   { background:var(--red); }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
      padding:5px 12px; font-size:11.5px; font-weight:500; font-family:var(--fn-ui);
      cursor:pointer; border-radius:3px; border:1px solid transparent;
      transition:background .12s, color .12s, border-color .12s; white-space:nowrap;
    }
    .btn-ghost { background:transparent; border-color:var(--border2); color:var(--text2); }
    .btn-ghost:hover { background:var(--bg3); color:var(--text); border-color:var(--teal); }
    .btn-ghost.active { background:var(--teal-dim); color:var(--teal); border-color:var(--teal); }
    .btn-sm  { padding:3px 8px; font-size:10.5px; }

    #panel-center { display:flex; flex-direction:column; overflow:hidden; min-width:0; }

    #viewer-wrap {
      position:relative; flex:1; min-height:280px;
      border-bottom:1px solid var(--border);
      background:var(--bg); overflow:hidden;
    }
    #viewer-wrap::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(var(--bg1) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg1) 1px, transparent 1px);
      background-size:40px 40px;
      opacity:0.4;
    }
    #mol-canvas { width:100%; height:100%; display:block; cursor:grab; position:relative; z-index:1; }
    #mol-canvas:active { cursor:grabbing; }

    #viewer-toolbar {
      position:absolute; top:10px; right:10px; z-index:10;
      display:flex; gap:5px;
    }
    #viewer-hint {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%); z-index:10;
      font-size:9.5px; color:var(--text3); pointer-events:none;
      background:rgba(13,17,23,0.7); padding:2px 10px; border-radius:10px;
      border:1px solid var(--border); letter-spacing:0.04em;
      font-family:var(--fn-mono);
    }
    #atom-labels { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:10; }
    .atom-lbl {
      position:absolute; transform:translate(-50%,-130%);
      font-family:var(--fn-mono); font-size:10.5px; font-weight:600;
      color:var(--teal); background:rgba(13,17,23,0.78);
      padding:0 4px; border:1px solid var(--teal-glow); border-radius:2px;
      line-height:1.5; white-space:nowrap; pointer-events:none;
    }

    #viewer-placeholder {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:8px; pointer-events:none; z-index:5;
    }
    .ph-symbol { font-size:52px; opacity:0.06; font-family:var(--fn-mono); color:var(--teal); font-weight:600; }
    #viewer-placeholder p { font-size:11.5px; color:var(--text3); text-align:center;
                             line-height:1.6; font-family:var(--fn-mono); }

    #plots-wrap { height:258px; display:flex; flex-direction:column; flex-shrink:0; }

    #tab-bar {
      display:flex; align-items:center; padding:0 14px; gap:2px;
      border-bottom:1px solid var(--border); background:var(--bg1);
      flex-shrink:0; height:34px;
    }
    .tab-btn {
      padding:0 10px; height:100%; font-size:11px; font-weight:500;
      background:transparent; border:none; border-bottom:2px solid transparent;
      cursor:pointer; color:var(--text3); transition:color .12s, border-color .12s;
      font-family:var(--fn-ui); white-space:nowrap;
    }
    .tab-btn:hover { color:var(--text2); }
    .tab-btn.active { color:var(--teal); border-bottom-color:var(--teal); font-weight:600; }

    #plots-panels { flex:1; position:relative; overflow:hidden; background:var(--bg); }
    .tab-panel { position:absolute; inset:0; display:none; padding:10px 14px 6px; }
    .tab-panel.active { display:block; }
    .tab-panel canvas { width:100% !important; height:100% !important; }

    #results-empty {
      display:flex; align-items:center; justify-content:center; height:100%;
      text-align:center; color:var(--text3); font-size:11.5px; padding:20px;
      font-family:var(--fn-mono);
    }
    #results-empty .empty-icon { font-size:36px; opacity:0.1; margin-bottom:8px; }

    .r-card { padding:12px 14px; border-bottom:1px solid var(--border); }
    .r-title {
      font-size:9.5px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text3); margin-bottom:8px; display:flex; align-items:center; gap:5px;
    }
    .r-title::before { content:''; width:3px; height:3px; background:var(--orange);
                       border-radius:50%; display:block; }
    .r-row { display:flex; justify-content:space-between; align-items:baseline; margin:3px 0; }
    .r-lbl { font-size:11px; color:var(--text2); }
    .r-val { font-family:var(--fn-mono); font-size:11px; color:var(--text); text-align:right; }
    .r-val.teal   { color:var(--teal); }
    .r-val.green  { color:var(--green); }
    .r-val.red    { color:var(--red); }
    .r-val.orange { color:var(--orange); }
    .r-divider { height:1px; background:var(--border); margin:6px 0; }
    .r-big { font-family:var(--fn-mono); font-size:14px; font-weight:600;
              color:var(--teal); margin:5px 0 2px; letter-spacing:-0.01em; }
    .r-sub { font-size:10px; color:var(--text3); font-family:var(--fn-mono); margin-bottom:4px; }

    .bond-table { width:100%; border-collapse:collapse; font-size:10.5px;
                  font-family:var(--fn-mono); margin-top:4px; }
    .bond-table th { color:var(--text3); font-weight:500; text-align:left;
                     padding:2px 4px; border-bottom:1px solid var(--border); }
    .bond-table td { color:var(--text); padding:2px 4px; }
    .bond-table tr:hover td { background:var(--bg3); }

    #error-log {
      display:none; padding:10px 14px; font-family:var(--fn-mono);
      font-size:10.5px; color:var(--red); background:rgba(248,81,73,0.07);
      border:1px solid rgba(248,81,73,0.25); border-radius:3px; margin:10px;
      white-space:pre-wrap; max-height:200px; overflow-y:auto; line-height:1.5;
    }

    #vib-panel {
      padding:8px 10px; height:100%; display:flex; flex-direction:column; overflow:hidden;
    }
    .vib-controls {
      display:flex; align-items:center; gap:8px; margin-bottom:8px;
      flex-shrink:0; flex-wrap:wrap;
    }
    .vib-controls label { font-size:10.5px; color:var(--text2); white-space:nowrap; }
    .vib-slider {
      -webkit-appearance:none; appearance:none;
      width:72px; height:4px; border-radius:2px;
      background:var(--border2); outline:none; cursor:pointer; flex-shrink:0;
    }
    .vib-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
      background:var(--teal); cursor:pointer;
    }
    .vib-mode-list {
      display:flex; flex-direction:column; gap:3px;
      overflow-y:auto; flex:1;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    .vib-mode-item {
      display:flex; align-items:center; gap:10px;
      padding:5px 8px; border:1px solid var(--border); border-radius:3px;
      cursor:pointer; font-family:var(--fn-mono); font-size:11px;
      transition:background .12s, border-color .12s; flex-shrink:0;
    }
    .vib-mode-item:hover  { background:var(--bg3); }
    .vib-mode-item.active { background:var(--teal-dim); border-color:var(--teal); }
    .vib-mode-num  { color:var(--text3); width:22px; flex-shrink:0; font-size:10px; }
    .vib-freq-real { color:var(--teal); flex:1; }
    .vib-freq-imag { color:var(--red);  flex:1; }
    .vib-zpe { margin-top:8px; font-size:10.5px; color:var(--text3);
               font-family:var(--fn-mono); flex-shrink:0; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="hdr-logo">
      <span class="hdr-atom">⚛</span>
      <span class="hdr-name">PLANCK</span>
      <span class="hdr-tag">log viewer</span>
    </div>
    <div id="status-badge" class="badge badge-idle">Loading…</div>
    <div class="hdr-right">
      <button class="btn btn-ghost btn-sm" onclick="loadFromAPI()" title="Reload data">↺ Reload</button>
    </div>
  </header>

  <!-- Workspace -->
  <div id="workspace">

    <!-- Left: Calculation info -->
    <aside id="panel-setup">
      <div class="ps">
        <div class="ps-title">Calculation</div>
        <div id="log-info"></div>
      </div>
      <div class="ps">
        <div class="ps-title">Molecule</div>
        <div id="mol-info"></div>
      </div>
      <div class="ps" id="ps-bonds" style="display:none">
        <div class="ps-title">Bond Lengths</div>
        <div id="bond-info"></div>
      </div>
    </aside>

    <div
      class="resize-handle"
      id="resize-left"
      role="separator"
      aria-label="Resize left panel"
      aria-orientation="vertical"
      tabindex="0"
    ></div>

    <!-- Center: Viewer + Plots -->
    <main id="panel-center">

      <div id="viewer-wrap">
        <canvas id="mol-canvas"></canvas>
        <div id="atom-labels"></div>
        <div id="viewer-placeholder">
          <div class="ph-symbol">⚛</div>
          <p>Loading molecule…</p>
        </div>
        <div id="viewer-toolbar">
          <button class="btn btn-ghost btn-sm" onclick="resetCamera()" title="Reset view">↺</button>
          <button class="btn btn-ghost btn-sm" id="btn-lbl" onclick="toggleLabels()">Labels</button>
          <button class="btn btn-ghost btn-sm active" id="btn-hb" onclick="toggleHBonds()">H-bonds</button>
        </div>
        <div id="viewer-hint">Drag · rotate &nbsp;|&nbsp; Scroll · zoom</div>
      </div>

      <!-- Plots -->
      <div id="plots-wrap">
        <div id="tab-bar">
          <button class="tab-btn active" data-tab="scf"   onclick="showTab('scf',   this)">SCF Convergence</button>
          <button class="tab-btn" id="btn-tab-orb"    data-tab="orb"    onclick="showTab('orb',    this)" style="display:none">Orbital Energies</button>
          <button class="tab-btn" id="btn-tab-casscf" data-tab="casscf" onclick="showTab('casscf', this)" style="display:none">CASSCF</button>
          <button class="tab-btn" id="btn-tab-geopt"  data-tab="geopt"  onclick="showTab('geopt',  this)" style="display:none">Geopt Trajectory</button>
          <button class="tab-btn" id="btn-tab-vib"    data-tab="vib"    onclick="showTab('vib',    this)" style="display:none">Vibrations</button>
        </div>
        <div id="plots-panels">
          <div class="tab-panel active" id="tab-scf">    <canvas id="c-scf"></canvas></div>
          <div class="tab-panel"        id="tab-orb">    <canvas id="c-orb"></canvas></div>
          <div class="tab-panel"        id="tab-casscf"> <canvas id="c-casscf"></canvas></div>
          <div class="tab-panel"        id="tab-geopt">  <canvas id="c-geopt"></canvas></div>
          <div class="tab-panel"        id="tab-vib">
            <div id="vib-panel">
              <div class="vib-controls">
                <button class="btn btn-ghost btn-sm" id="btn-vib-play" onclick="toggleVibPlay()">▶ Play</button>
                <label>Amp</label>
                <input type="range" class="vib-slider" id="vib-amp"
                       min="0.05" max="1.0" step="0.05" value="0.3"
                       oninput="gVibAmplitude=+this.value">
                <label>Speed</label>
                <input type="range" class="vib-slider" id="vib-speed"
                       min="0.3" max="5.0" step="0.1" value="2.0"
                       oninput="gVibSpeed=+this.value">
              </div>
              <div id="vib-mode-list" class="vib-mode-list"></div>
            </div>
          </div>
        </div>
      </div>

    </main>

    <div
      class="resize-handle"
      id="resize-right"
      role="separator"
      aria-label="Resize right panel"
      aria-orientation="vertical"
      tabindex="0"
    ></div>

    <!-- Right: Results -->
    <aside id="panel-results">
      <div id="results-empty">
        <div>
          <div class="empty-icon">≡</div>
          <p>Loading results…</p>
        </div>
      </div>
      <div id="results-data" style="display:none"></div>
      <div id="error-log"></div>
    </aside>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   ELEMENT DATA
═══════════════════════════════════════════════════════════════════════════ */
const CPK = {
  H:'#d4d4d4', He:'#d9ffff', Li:'#cc80ff', Be:'#c2ff00', B:'#ffb5b5',
  C:'#606060', N:'#3b6fe0', O:'#e03030', F:'#90e050', Ne:'#b3e3f5',
  Na:'#ab5cf2', Mg:'#8aff00', Al:'#bfa6a6', Si:'#f0c8a0', P:'#ff8000',
  S:'#e8d800', Cl:'#1fd01f', Ar:'#80d1e3',
};
const SPH_R = {
  H:0.27, He:0.25, Li:0.70, Be:0.40, B:0.72, C:0.65, N:0.60, O:0.55,
  F:0.48, Ne:0.36, Na:0.90, Mg:0.70, Al:0.58, Si:0.53, P:0.50, S:0.50,
  Cl:0.72, Ar:0.68,
};
const COV_R = {
  H:0.31, He:0.28, Li:1.28, Be:0.96, B:0.84, C:0.76, N:0.71, O:0.66,
  F:0.57, Ne:0.58, Na:1.66, Mg:1.41, Al:1.21, Si:1.11, P:1.07,
  S:1.05, Cl:1.02, Ar:1.06,
};

/* ═══════════════════════════════════════════════════════════════════════════
   MOLECULE STATE
═══════════════════════════════════════════════════════════════════════════ */
let gAtoms  = [];
let gBonds  = [];
let gHBonds = [];

function dist3(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}
function v3sub(a, b) { return {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}; }
function v3dot(a, b) { return a.x*b.x + a.y*b.y + a.z*b.z; }
function v3len(a)    { return Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z); }

function detectHBonds(atoms, bonds) {
  const DONORS = new Set(['N','O','F']);
  const ACCEPT = new Set(['N','O','F','Cl']);
  const adj = Array.from({length:atoms.length}, () => []);
  bonds.forEach(([i,j]) => { adj[i].push(j); adj[j].push(i); });
  const bonded = new Set(bonds.map(([i,j]) => `${Math.min(i,j)}_${Math.max(i,j)}`));
  const hb = [];
  atoms.forEach((atom, hi) => {
    if (atom.symbol !== 'H') return;
    adj[hi].filter(di => DONORS.has(atoms[di].symbol)).forEach(di => {
      atoms.forEach((acc, ai) => {
        if (ai===hi || ai===di) return;
        if (!ACCEPT.has(acc.symbol)) return;
        if (bonded.has(`${Math.min(hi,ai)}_${Math.max(hi,ai)}`)) return;
        if (dist3(atoms[hi], acc) > 2.5) return;
        const HD = v3sub(atoms[di], atoms[hi]);
        const HA = v3sub(acc, atoms[hi]);
        const cosA = v3dot(HD, HA) / (v3len(HD) * v3len(HA) + 1e-12);
        if (Math.acos(Math.max(-1, Math.min(1, cosA))) * 180/Math.PI >= 120)
          hb.push([hi, ai]);
      });
    });
  });
  return hb;
}

function setMolecule(atoms, bonds, hbonds) {
  gAtoms  = atoms;
  gBonds  = bonds  || [];
  gHBonds = hbonds || detectHBonds(atoms, gBonds);
  updateMolInfo(atoms);
  document.getElementById('viewer-placeholder').style.display = 'none';
  renderMolecule();
}

function updateMolInfo(atoms) {
  const freq = {};
  atoms.forEach(a => freq[a.symbol] = (freq[a.symbol]||0) + 1);
  const formula = Object.entries(freq).map(([s,n]) => `${s}${n>1?n:''}`).join('');
  const el = document.getElementById('mol-info');
  el.innerHTML = `<span class="chip">${formula}</span> <span class="chip">${atoms.length} atom${atoms.length>1?'s':''}</span>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════════════════════════════════════
   PANEL RESIZE
═══════════════════════════════════════════════════════════════════════════ */
const PANEL_STORAGE_KEY = 'planck_visualizer_panel_widths_v1';
const PANEL_CONSTRAINTS = {
  left:  {min: 180, max: 460, defaultWidth: 240},
  right: {min: 220, max: 520, defaultWidth: 276},
  centerMin: 420,
  keyboardStep: 16,
};

function getWorkspaceEl() {
  return document.getElementById('workspace');
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function getHandleWidthPx() {
  const raw = getComputedStyle(document.documentElement)
    .getPropertyValue('--resize-handle-width')
    .trim();
  const parsed = Number.parseFloat(raw);
  return Number.isFinite(parsed) ? parsed : 10;
}

function getPanelVarName(side) {
  return side === 'left' ? '--left-panel-width' : '--right-panel-width';
}

function getPanelWidth(side) {
  const varName = getPanelVarName(side);
  const width = Number.parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue(varName)
  );
  return Number.isFinite(width) ? width : PANEL_CONSTRAINTS[side].defaultWidth;
}

function setPanelWidth(side, width) {
  document.documentElement.style.setProperty(
    getPanelVarName(side),
    `${Math.round(width)}px`
  );
}

function constrainPanelWidth(side, proposed) {
  const workspace = getWorkspaceEl();
  const rect = workspace.getBoundingClientRect();
  const handleWidth = getHandleWidthPx();
  const otherSide = side === 'left' ? 'right' : 'left';
  const otherWidth = getPanelWidth(otherSide);
  const own = PANEL_CONSTRAINTS[side];
  const maxAllowed = Math.max(
    own.min,
    rect.width - otherWidth - (2 * handleWidth) - PANEL_CONSTRAINTS.centerMin
  );
  return clamp(proposed, own.min, Math.min(own.max, maxAllowed));
}

function savePanelWidths() {
  const payload = {
    left: getPanelWidth('left'),
    right: getPanelWidth('right'),
  };
  try { localStorage.setItem(PANEL_STORAGE_KEY, JSON.stringify(payload)); }
  catch (_) {}
}

function loadPanelWidths() {
  try {
    const raw = localStorage.getItem(PANEL_STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!Number.isFinite(parsed.left) || !Number.isFinite(parsed.right)) return null;
    return parsed;
  } catch (_) {
    return null;
  }
}

function resizePanelByKeyboard(side, delta) {
  setPanelWidth(side, constrainPanelWidth(side, getPanelWidth(side) + delta));
  savePanelWidths();
}

function applyStoredPanelWidths() {
  const stored = loadPanelWidths();
  if (!stored) return;
  setPanelWidth('left', constrainPanelWidth('left', stored.left));
  setPanelWidth('right', constrainPanelWidth('right', stored.right));
}

function setupPanelResize() {
  const workspace = getWorkspaceEl();
  const handles = [
    {el: document.getElementById('resize-left'), side: 'left'},
    {el: document.getElementById('resize-right'), side: 'right'},
  ];

  applyStoredPanelWidths();

  window.addEventListener('resize', () => {
    setPanelWidth('left', constrainPanelWidth('left', getPanelWidth('left')));
    setPanelWidth('right', constrainPanelWidth('right', getPanelWidth('right')));
    savePanelWidths();
  });

  handles.forEach(({el, side}) => {
    el.addEventListener('dblclick', () => {
      setPanelWidth(side, PANEL_CONSTRAINTS[side].defaultWidth);
      savePanelWidths();
    });

    el.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        resizePanelByKeyboard(side, -PANEL_CONSTRAINTS.keyboardStep);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        resizePanelByKeyboard(side, PANEL_CONSTRAINTS.keyboardStep);
      } else if (e.key === 'Home') {
        e.preventDefault();
        setPanelWidth(side, PANEL_CONSTRAINTS[side].min);
        savePanelWidths();
      } else if (e.key === 'End') {
        e.preventDefault();
        setPanelWidth(side, constrainPanelWidth(side, PANEL_CONSTRAINTS[side].max));
        savePanelWidths();
      }
    });

    el.addEventListener('pointerdown', e => {
      el.classList.add('active');
      el.setPointerCapture(e.pointerId);

      const onMove = evt => {
        const rect = workspace.getBoundingClientRect();
        if (side === 'left') {
          setPanelWidth('left', constrainPanelWidth('left', evt.clientX - rect.left));
        } else {
          setPanelWidth('right', constrainPanelWidth('right', rect.right - evt.clientX));
        }
      };

      const stop = evt => {
        el.classList.remove('active');
        if (el.hasPointerCapture(evt.pointerId)) {
          el.releasePointerCapture(evt.pointerId);
        }
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', stop);
        el.removeEventListener('pointercancel', stop);
        savePanelWidths();
      };

      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', stop);
      el.addEventListener('pointercancel', stop);
    });
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   THREE.JS MOLECULE VIEWER
═══════════════════════════════════════════════════════════════════════════ */
let renderer, scene, camera, molGroup, animId;
let theta=0.35, phi=1.25, camR=8;
let isDrag=false, lastX=0, lastY=0;
let showLabels=false, showHBonds=true;
let molCenter={x:0, y:0, z:0};

let gVibData       = null;
let gVibModeIdx    = 0;
let gVibAmplitude  = 0.3;
let gVibSpeed      = 2.0;
let gVibPlaying    = false;
let gVibT          = 0;
let gVibAtomMeshes = [];
let gVibBondData   = [];
let gVibEquilPos   = [];

function initViewer() {
  const canvas = document.getElementById('mol-canvas');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);
  camera = new THREE.PerspectiveCamera(40, 1, 0.01, 500);
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const key  = new THREE.DirectionalLight(0xffffff, 0.80); key.position.set(3,4,5);   scene.add(key);
  const fill = new THREE.DirectionalLight(0xc0d8f0, 0.25); fill.position.set(-3,2,-3); scene.add(fill);
  const rim  = new THREE.DirectionalLight(0x39d0c8, 0.15); rim.position.set(0,-3,0);   scene.add(rim);

  const ro = new ResizeObserver(() => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  });
  ro.observe(canvas);

  canvas.addEventListener('mousedown', e => { isDrag=true; lastX=e.clientX; lastY=e.clientY; e.preventDefault(); });
  document.addEventListener('mouseup', () => isDrag=false);
  document.addEventListener('mousemove', e => {
    if (!isDrag) return;
    theta -= (e.clientX-lastX)*0.007;
    phi    = Math.max(0.05, Math.min(Math.PI-0.05, phi-(e.clientY-lastY)*0.007));
    lastX=e.clientX; lastY=e.clientY; updateCamera();
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    camR = Math.max(1.5, Math.min(80, camR+e.deltaY*0.006));
    updateCamera();
  }, {passive:false});

  let lastPinch=0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length===1) { isDrag=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
    else if (e.touches.length===2) { isDrag=false; lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length===1 && isDrag) {
      theta -= (e.touches[0].clientX-lastX)*0.007;
      phi = Math.max(0.05, Math.min(Math.PI-0.05, phi-(e.touches[0].clientY-lastY)*0.007));
      lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; updateCamera();
    } else if (e.touches.length===2) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      camR = Math.max(1.5, Math.min(80, camR-(d-lastPinch)*0.015)); lastPinch=d; updateCamera();
    }
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () => isDrag=false);

  updateCamera();
  animate();
}

function updateCamera() {
  camera.position.set(
    camR*Math.sin(phi)*Math.sin(theta),
    camR*Math.cos(phi),
    camR*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}

function animate() {
  animId = requestAnimationFrame(animate);
  if (gVibPlaying && gVibData && gVibAtomMeshes.length) {
    gVibT += 0.025 * gVibSpeed;
    const disp = gVibAmplitude * Math.sin(gVibT);
    const mode = gVibData.normal_modes[gVibModeIdx];
    if (mode) {
      gVibAtomMeshes.forEach((mesh, i) => {
        if (!gVibEquilPos[i] || !mode[i]) return;
        mesh.position.set(
          gVibEquilPos[i].x + disp * mode[i][0],
          gVibEquilPos[i].y + disp * mode[i][1],
          gVibEquilPos[i].z + disp * mode[i][2]
        );
      });
      gVibBondData.forEach(bd => {
        const pA = gVibAtomMeshes[bd.i].position;
        const pB = gVibAtomMeshes[bd.j].position;
        const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
        setBondHalfTransform(bd.halfA, pA, mid);
        setBondHalfTransform(bd.halfB, mid, pB);
      });
    }
  }
  renderer.render(scene, camera);
  if (showLabels && molGroup) updateAtomLabels();
}

function resetCamera() { theta=0.35; phi=1.25; fitCamera(gAtoms); updateCamera(); }

function fitCamera(atoms) {
  if (!atoms.length) return;
  const cx = atoms.reduce((s,a) => s+a.x, 0) / atoms.length;
  const cy = atoms.reduce((s,a) => s+a.y, 0) / atoms.length;
  const cz = atoms.reduce((s,a) => s+a.z, 0) / atoms.length;
  const maxR = atoms.reduce((m,a) => Math.max(m, Math.hypot(a.x-cx, a.y-cy, a.z-cz)), 0.5);
  camR = maxR*3.5 + 4;
}

function renderMolecule() {
  stopVibAnimation();
  if (molGroup) { scene.remove(molGroup); molGroup=null; }
  if (!gAtoms.length) return;

  molCenter.x = gAtoms.reduce((s,a) => s+a.x, 0) / gAtoms.length;
  molCenter.y = gAtoms.reduce((s,a) => s+a.y, 0) / gAtoms.length;
  molCenter.z = gAtoms.reduce((s,a) => s+a.z, 0) / gAtoms.length;
  molGroup = new THREE.Group();
  gVibAtomMeshes = [];
  gVibBondData   = [];
  gVibEquilPos   = [];

  gAtoms.forEach(a => {
    const pos = new THREE.Vector3(a.x-molCenter.x, a.y-molCenter.y, a.z-molCenter.z);
    const r   = SPH_R[a.symbol] ?? 0.50;
    const col = parseInt((CPK[a.symbol] ?? '#ff69b4').replace('#',''), 16);
    const geo = new THREE.SphereGeometry(r, 22, 16);
    const mat = new THREE.MeshPhongMaterial({color:col, shininess:80, specular:0x444444});
    const m   = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    molGroup.add(m);
    gVibAtomMeshes.push(m);
    gVibEquilPos.push(pos.clone());
  });

  gBonds.forEach(([i,j]) => {
    const a = gAtoms[i], b = gAtoms[j];
    const p1 = new THREE.Vector3(a.x-molCenter.x, a.y-molCenter.y, a.z-molCenter.z);
    const p2 = new THREE.Vector3(b.x-molCenter.x, b.y-molCenter.y, b.z-molCenter.z);
    const mid = p1.clone().add(p2).multiplyScalar(0.5);
    const halfA = addBondHalf(molGroup, p1, mid, 0.068, parseInt((CPK[a.symbol]??'#888').replace('#',''), 16));
    const halfB = addBondHalf(molGroup, mid, p2, 0.068, parseInt((CPK[b.symbol]??'#888').replace('#',''), 16));
    if (halfA && halfB) gVibBondData.push({halfA, halfB, i, j});
  });

  if (showHBonds) {
    gHBonds.forEach(([i,j]) => {
      const a = gAtoms[i], b = gAtoms[j];
      const p1 = new THREE.Vector3(a.x-molCenter.x, a.y-molCenter.y, a.z-molCenter.z);
      const p2 = new THREE.Vector3(b.x-molCenter.x, b.y-molCenter.y, b.z-molCenter.z);
      addHBondLine(molGroup, p1, p2);
    });
  }

  scene.add(molGroup);
  fitCamera(gAtoms);
  updateCamera();
}

function addBondHalf(group, p1, p2, radius, color) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length(); if (len < 0.001) return null;
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  const geo = new THREE.CylinderGeometry(radius, radius, len, 10);
  const mat = new THREE.MeshPhongMaterial({color, shininess:40});
  const m   = new THREE.Mesh(geo, mat);
  m.position.copy(mid);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  m.userData.origLen = len;
  group.add(m);
  return m;
}

function setBondHalfTransform(mesh, p1, p2) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length(); if (len < 0.001) return;
  mesh.position.copy(new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5));
  mesh.scale.y = len / (mesh.userData.origLen || len);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
}

function addHBondLine(group, p1, p2) {
  const geo  = new THREE.BufferGeometry().setFromPoints([p1.clone(), p2.clone()]);
  const mat  = new THREE.LineDashedMaterial({color:0x39d0c8, linewidth:1, dashSize:0.20, gapSize:0.14});
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  group.add(line);
}

function updateAtomLabels() {
  const div    = document.getElementById('atom-labels');
  const canvas = document.getElementById('mol-canvas');
  const rect   = canvas.getBoundingClientRect();
  div.innerHTML = '';
  gAtoms.forEach((a, i) => {
    const v = new THREE.Vector3(a.x-molCenter.x, a.y-molCenter.y, a.z-molCenter.z).project(camera);
    if (v.z > 1) return;
    const x = (v.x*0.5+0.5)*rect.width;
    const y = (-v.y*0.5+0.5)*rect.height;
    const sp = document.createElement('span');
    sp.className = 'atom-lbl';
    sp.style.left = x+'px'; sp.style.top = y+'px';
    sp.textContent = a.symbol + (gAtoms.length>1 ? (i+1) : '');
    div.appendChild(sp);
  });
}

function toggleLabels() {
  showLabels = !showLabels;
  const btn = document.getElementById('btn-lbl');
  btn.textContent = 'Labels' + (showLabels ? ' ✓' : '');
  btn.classList.toggle('active', showLabels);
  if (!showLabels) document.getElementById('atom-labels').innerHTML = '';
}

function toggleHBonds() {
  showHBonds = !showHBonds;
  const btn = document.getElementById('btn-hb');
  btn.textContent = 'H-bonds' + (showHBonds ? ' ✓' : '');
  btn.classList.toggle('active', showHBonds);
  renderMolecule();
}

/* ═══════════════════════════════════════════════════════════════════════════
   VIBRATION ANIMATION
═══════════════════════════════════════════════════════════════════════════ */
function stopVibAnimation() {
  gVibPlaying = false;
  gVibT = 0;
  gVibAtomMeshes = [];
  gVibBondData   = [];
  gVibEquilPos   = [];
  const btn = document.getElementById('btn-vib-play');
  if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('active'); }
}

function selectVibMode(idx) {
  gVibModeIdx = idx;
  gVibT = 0;
  document.querySelectorAll('.vib-mode-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  if (!gVibPlaying) {
    gVibAtomMeshes.forEach((m, i) => { if (gVibEquilPos[i]) m.position.copy(gVibEquilPos[i]); });
  }
}

function toggleVibPlay() {
  if (!gVibData || !gVibAtomMeshes.length) return;
  if (!gVibData.normal_modes || !gVibData.normal_modes.length) return;
  gVibPlaying = !gVibPlaying;
  const btn = document.getElementById('btn-vib-play');
  btn.textContent = gVibPlaying ? '⏸ Pause' : '▶ Play';
  btn.classList.toggle('active', gVibPlaying);
  if (!gVibPlaying) {
    gVibAtomMeshes.forEach((m, i) => { if (gVibEquilPos[i]) m.position.copy(gVibEquilPos[i]); });
    gVibBondData.forEach(bd => {
      const pA  = gVibAtomMeshes[bd.i].position;
      const pB  = gVibAtomMeshes[bd.j].position;
      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      setBondHalfTransform(bd.halfA, pA, mid);
      setBondHalfTransform(bd.halfB, mid, pB);
    });
    gVibT = 0;
  }
}

function renderVibPanel(vibData) {
  gVibData    = vibData;
  gVibModeIdx = 0;
  gVibT       = 0;
  gVibPlaying = false;

  const ampEl   = document.getElementById('vib-amp');
  const spdEl   = document.getElementById('vib-speed');
  const playBtn = document.getElementById('btn-vib-play');
  if (ampEl)   { ampEl.value   = 0.3; gVibAmplitude = 0.3; }
  if (spdEl)   { spdEl.value   = 2.0; gVibSpeed     = 2.0; }
  if (playBtn) { playBtn.textContent = '▶ Play'; playBtn.classList.remove('active'); }

  const hasNormalModes = vibData.normal_modes && vibData.normal_modes.length > 0;
  if (playBtn) playBtn.style.display = hasNormalModes ? '' : 'none';

  const list = document.getElementById('vib-mode-list');
  list.innerHTML = '';
  vibData.frequencies.forEach((freq, i) => {
    const isImag  = freq < 0;
    const absFreq = Math.abs(freq);
    const item    = document.createElement('div');
    item.className = 'vib-mode-item' + (i === 0 ? ' active' : '');
    item.onclick   = () => selectVibMode(i);
    item.innerHTML =
      `<span class="vib-mode-num">ν${i+1}</span>` +
      `<span class="${isImag ? 'vib-freq-imag' : 'vib-freq-real'}">${isImag ? 'i·' : ''}${absFreq.toFixed(1)} cm⁻¹</span>`;
    list.appendChild(item);
  });

  if (vibData.zpe != null) {
    const zpeEl = document.createElement('div');
    zpeEl.className = 'vib-zpe';
    zpeEl.textContent = `ZPE = ${vibData.zpe.toFixed(6)} Ha`;
    list.appendChild(zpeEl);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════

Chart.register({
  id:'darkBg',
  beforeDraw(chart) {
    const {ctx} = chart; ctx.save();
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, chart.width, chart.height);
    ctx.restore();
  }
});

const MF = {family:"'IBM Plex Mono',monospace", size:10};
const GRID_COLOR = '#1c2128';
const TICK_COLOR = '#484f58';
const BASE_OPTS = {
  responsive:true, maintainAspectRatio:false,
  animation:{duration:350},
  plugins:{
    legend:{labels:{font:MF, color:TICK_COLOR, boxWidth:10, padding:10}},
    tooltip:{bodyFont:MF, titleFont:MF, padding:7,
             backgroundColor:'#1c2128', borderColor:'#30363d', borderWidth:1,
             titleColor:'#e6edf3', bodyColor:'#7d8590'}
  },
  scales:{
    x:{ticks:{font:MF, color:TICK_COLOR, maxRotation:0}, grid:{color:GRID_COLOR}},
    y:{ticks:{font:MF, color:TICK_COLOR}, grid:{color:GRID_COLOR}}
  }
};
let charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function renderSCFChart(scf) {
  destroyChart('scf');
  const ctx  = document.getElementById('c-scf').getContext('2d');
  const hist = scf.energy_history;
  charts['scf'] = new Chart(ctx, {
    type:'line',
    data:{
      labels:hist.map((_,i) => i+1),
      datasets:[{
        label:'Total energy (Ha)', data:hist,
        borderColor:'#39d0c8', borderWidth:2,
        backgroundColor:'rgba(57,208,200,0.07)',
        pointRadius:3, pointBackgroundColor:'#39d0c8', pointBorderColor:'#0d1117',
        tension:0.15, fill:true,
      }]
    },
    options:{
      ...BASE_OPTS,
      plugins:{...BASE_OPTS.plugins,
        legend:{display:false},
        tooltip:{...BASE_OPTS.plugins.tooltip,
          callbacks:{label:c => ` E = ${c.parsed.y.toFixed(8)} Ha`}}
      },
      scales:{
        x:{...BASE_OPTS.scales.x, title:{display:true, text:'SCF iteration', font:MF, color:TICK_COLOR}},
        y:{...BASE_OPTS.scales.y, title:{display:true, text:'Energy (Ha)',   font:MF, color:TICK_COLOR}}
      }
    }
  });
}

function renderCASChart(casscf) {
  destroyChart('casscf');
  const ctx     = document.getElementById('c-casscf').getContext('2d');
  const iters   = casscf.energy_history.map((_, i) => i + 1);
  const energies = casscf.energy_history;
  const grads   = casscf.sa_grad_history;
  const hasGrad = grads && grads.length > 0;
  const datasets = [
    {
      label: 'SA Energy (Ha)', data: energies,
      borderColor: '#39d0c8', borderWidth: 2,
      pointRadius: 3, pointBackgroundColor: '#39d0c8', pointBorderColor: '#0d1117',
      yAxisID: 'yE', tension: 0.1,
    },
  ];
  const scales = {
    x: {...BASE_OPTS.scales.x, title: {display: true, text: 'CASSCF macro iteration', font: MF, color: TICK_COLOR}},
    yE: {...BASE_OPTS.scales.y, position: 'left',
         title: {display: true, text: 'Energy (Ha)', font: MF, color: TICK_COLOR}},
  };
  if (hasGrad) {
    datasets.push({
      label: '‖g_SA‖∞', data: grads,
      borderColor: '#f0883e', borderWidth: 1.8, borderDash: [5, 3],
      pointRadius: 3, pointBackgroundColor: '#f0883e', pointBorderColor: '#0d1117',
      yAxisID: 'yG', tension: 0.1,
    });
    scales.yG = {
      position: 'right', type: 'logarithmic',
      ticks: {font: MF, color: TICK_COLOR},
      grid: {drawOnChartArea: false},
      title: {display: true, text: '‖g_SA‖∞ (log)', font: MF, color: TICK_COLOR},
    };
  }
  charts['casscf'] = new Chart(ctx, {
    type: 'line',
    data: {labels: iters, datasets},
    options: {
      ...BASE_OPTS,
      plugins: {...BASE_OPTS.plugins,
        legend: {labels: {font: MF, color: TICK_COLOR, boxWidth: 8, padding: 8}}},
      scales,
    },
  });
}

function renderOrbChart(scf, level) {
  destroyChart('orb');
  const es   = scf.orbital_energies || [];
  const nocc = scf.n_occ;
  if (!es.length) return;

  const ctx    = document.getElementById('c-orb').getContext('2d');
  const sticks = [];
  es.forEach((e, i) => {
    const occ = nocc != null && i < nocc;
    sticks.push({
      data:[{x:i-0.38, y:e}, {x:i+0.38, y:e}],
      borderColor: occ ? '#58a6ff' : '#f0883e',
      borderWidth:2.5, pointRadius:0, showLine:true, fill:false,
      label: i===0 ? 'Occupied' : (nocc!=null && i===nocc ? 'Virtual' : ''),
      _info:`MO${i+1} ${occ?'(occ)':'(virt)'}`,
    });
  });
  const seen = new Set();
  sticks.forEach(ds => {
    if (seen.has(ds.label) || ds.label==='') ds._showLegend = false;
    else { ds._showLegend = true; seen.add(ds.label); }
  });
  charts['orb'] = new Chart(ctx, {
    type:'scatter',
    data:{datasets:sticks},
    options:{
      ...BASE_OPTS,
      plugins:{
        ...BASE_OPTS.plugins,
        legend:{display:true, labels:{
          font:MF, color:TICK_COLOR, boxWidth:8, padding:8,
          filter: item => sticks[item.datasetIndex]?._showLegend,
        }},
        tooltip:{...BASE_OPTS.plugins.tooltip,
          callbacks:{label:c => ` ${sticks[c.datasetIndex]?._info||''} ${c.parsed.y.toFixed(6)} Ha`}}
      },
      scales:{
        x:{display:false},
        y:{...BASE_OPTS.scales.y, title:{display:true, text:'Orbital energy (Ha)', font:MF, color:TICK_COLOR}}
      }
    }
  });
}

function renderGeoptChart(geopt) {
  destroyChart('geopt');
  const ctx     = document.getElementById('c-geopt').getContext('2d');
  const steps   = geopt.trajectory.map(t => t.step);
  const energies = geopt.trajectory.map(t => t.energy);
  const grads   = geopt.trajectory.map(t => t.gradient_max);
  charts['geopt'] = new Chart(ctx, {
    type:'line',
    data:{
      labels:steps,
      datasets:[
        {label:'Energy (Ha)', data:energies, borderColor:'#39d0c8', borderWidth:2,
         pointRadius:3, pointBackgroundColor:'#39d0c8', pointBorderColor:'#0d1117',
         yAxisID:'yE', tension:0.1},
        {label:'Max |∇E| (Ha/Bohr)', data:grads, borderColor:'#f0883e', borderWidth:1.8,
         borderDash:[5,3], pointRadius:3, pointBackgroundColor:'#f0883e', pointBorderColor:'#0d1117',
         yAxisID:'yG', tension:0.1},
      ]
    },
    options:{
      ...BASE_OPTS,
      plugins:{...BASE_OPTS.plugins,
        legend:{labels:{font:MF, color:TICK_COLOR, boxWidth:8, padding:8}}},
      scales:{
        x:{...BASE_OPTS.scales.x, title:{display:true, text:'Geometry step', font:MF, color:TICK_COLOR}},
        yE:{...BASE_OPTS.scales.y, position:'left',
            title:{display:true, text:'Energy (Ha)', font:MF, color:TICK_COLOR}},
        yG:{position:'right', ticks:{font:MF, color:TICK_COLOR}, grid:{drawOnChartArea:false},
            title:{display:true, text:'Max |∇E|', font:MF, color:TICK_COLOR}}
      }
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESULTS PANEL
═══════════════════════════════════════════════════════════════════════════ */
function fmt(v, d=8) { return (v == null) ? '—' : v.toFixed(d); }

function renderResults(data) {
  const {level, basis, scf, mp2, casscf, geopt, molecule} = data;
  const isMP2 = level==='RMP2' || level==='UMP2';
  if (!scf && !geopt && !molecule) return;

  const totalE = (isMP2 && mp2) ? mp2.energy : (scf ? scf.energy : null);
  let html = '';

  if (totalE != null) {
    html += `<div class="r-card">
    <div class="r-title">Energy</div>
    <div class="r-big">${fmt(totalE)} Ha</div>
    <div class="r-sub">${level || ''} / ${(basis||'').toUpperCase()}</div>`;
    if (isMP2 && mp2) {
      html += `
    <div class="r-divider"></div>
    <div class="r-row"><span class="r-lbl">E(HF)</span>    <span class="r-val">${fmt(scf ? scf.energy : null)}</span></div>
    <div class="r-row"><span class="r-lbl">E(corr)</span>  <span class="r-val teal">${fmt(mp2.e_corr)}</span></div>
    <div class="r-row"><span class="r-lbl">E(total)</span> <span class="r-val">${fmt(mp2.energy)}</span></div>`;
    }
    if (scf) {
      html += `
    <div class="r-divider"></div>
    <div class="r-row"><span class="r-lbl">E(nuc)</span>   <span class="r-val">${fmt(scf.e_nuclear)}</span></div>
    <div class="r-row"><span class="r-lbl">E(elec)</span>  <span class="r-val">${fmt(scf.e_electronic)}</span></div>`;
    }
    html += `</div>`;
  }

  if (scf) {
    html += `<div class="r-card">
    <div class="r-title">SCF</div>
    <div class="r-row"><span class="r-lbl">Converged</span>
      <span class="r-val ${scf.converged?'green':'orange'}">${scf.converged?'yes':'—'}</span></div>
    <div class="r-row"><span class="r-lbl">Iterations</span>
      <span class="r-val">${scf.iterations}</span></div>`;
    const es = scf.orbital_energies || [];
    const nocc = scf.n_occ;
    if (es.length > 0 && nocc != null) {
      const eH  = es[nocc-1];
      const eL  = es[nocc];
      const gap = eL != null ? (eL-eH)*27.2114 : null;
      html += `
    <div class="r-row"><span class="r-lbl">HOMO</span> <span class="r-val">${fmt(eH,6)} Ha</span></div>
    <div class="r-row"><span class="r-lbl">LUMO</span> <span class="r-val">${eL!=null?fmt(eL,6)+' Ha':'—'}</span></div>
    ${gap!=null?`<div class="r-row"><span class="r-lbl">H–L gap</span><span class="r-val teal">${gap.toFixed(4)} eV</span></div>`:''}`;
    }
    html += `</div>`;
  }

  if (molecule && molecule.bonds && molecule.bonds.length > 0) {
    const syms = molecule.symbols, coords = molecule.coords_ang;
    html += `<div class="r-card">
      <div class="r-title">Bond Lengths</div>
      <table class="bond-table">
        <tr><th>Bond</th><th>Å</th><th>Bohr</th></tr>`;
    molecule.bonds.forEach(([i,j]) => {
      const c0 = coords[i], c1 = coords[j];
      const dA = Math.sqrt((c0[0]-c1[0])**2+(c0[1]-c1[1])**2+(c0[2]-c1[2])**2);
      const dB = dA * 1.8897259886;
      html += `<tr><td>${syms[i]}${i+1}–${syms[j]}${j+1}</td><td>${dA.toFixed(4)}</td><td>${dB.toFixed(4)}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (molecule) {
    html += `<div class="r-card">
    <div class="r-title">Molecule</div>
    <div class="r-row"><span class="r-lbl">Atoms</span>      <span class="r-val">${molecule.num_atoms}</span></div>
    <div class="r-row"><span class="r-lbl">Electrons</span>  <span class="r-val">${molecule.num_electrons}</span></div>
    <div class="r-row"><span class="r-lbl">Charge</span>     <span class="r-val">${molecule.charge}</span></div>
    <div class="r-row"><span class="r-lbl">Multiplicity</span><span class="r-val">${molecule.multiplicity}</span></div>
    ${molecule.hbonds&&molecule.hbonds.length?`<div class="r-row"><span class="r-lbl">H-bonds</span><span class="r-val teal">${molecule.hbonds.length}</span></div>`:''}
  </div>`;
  }

  if (casscf) {
    const saLabel = casscf.n_roots ? `SA(${casscf.n_roots})` : 'SS';
    html += `<div class="r-card">
      <div class="r-title">CASSCF</div>`;
    if (casscf.energy != null) {
      html += `<div class="r-big">${fmt(casscf.energy)} Ha</div>
      <div class="r-sub">${saLabel}-CASSCF${casscf.active_space ? ' ' + casscf.active_space : ''} / ${(basis||'').toUpperCase()}</div>`;
    }
    html += `
      <div class="r-divider"></div>
      <div class="r-row"><span class="r-lbl">Converged</span>
        <span class="r-val ${casscf.converged?'green':'orange'}">${casscf.converged?'yes':'no'}</span></div>
      <div class="r-row"><span class="r-lbl">Macro iter</span>
        <span class="r-val">${casscf.iterations}</span></div>`;
    if (casscf.e_corr != null) {
      html += `<div class="r-row"><span class="r-lbl">E(HF)</span>
        <span class="r-val">${fmt(scf ? scf.energy : null)}</span></div>
      <div class="r-row"><span class="r-lbl">E(corr)</span>
        <span class="r-val teal">${fmt(casscf.e_corr)}</span></div>`;
    }
    if (casscf.n_core != null) {
      html += `<div class="r-row"><span class="r-lbl">n_core</span>
        <span class="r-val">${casscf.n_core}</span></div>`;
    }
    if (casscf.natural_occs && casscf.natural_occs.length) {
      html += `<div class="r-divider"></div>
      <div class="r-row" style="margin-bottom:3px"><span class="r-lbl" style="color:var(--text2)">Nat. occ.</span></div>`;
      casscf.natural_occs.forEach((n, i) => {
        html += `<div class="r-row"><span class="r-lbl" style="padding-left:8px">MO ${i+1}</span>
          <span class="r-val">${n.toFixed(6)}</span></div>`;
      });
    }
    if (casscf.sa_roots && casscf.sa_roots.length) {
      html += `<div class="r-divider"></div>
      <div class="r-row" style="margin-bottom:3px"><span class="r-lbl" style="color:var(--text2)">SA roots</span></div>`;
      casscf.sa_roots.forEach(r => {
        html += `<div class="r-row">
          <span class="r-lbl" style="padding-left:8px">Root ${r.root} (w=${r.weight.toFixed(3)})</span>
          <span class="r-val">${fmt(r.energy, 6)} Ha</span></div>`;
      });
    }
    html += `</div>`;
  }

  if (geopt) {
    html += `<div class="r-card">
      <div class="r-title">Geometry Optimisation</div>
      <div class="r-row"><span class="r-lbl">Converged</span>
        <span class="r-val ${geopt.converged?'green':'orange'}">${geopt.converged?'yes':'no'}</span></div>
      <div class="r-row"><span class="r-lbl">Steps</span> <span class="r-val">${geopt.iterations}</span></div>
      <div class="r-row"><span class="r-lbl">Max |∇E|</span>
        <span class="r-val">${geopt.gradient_max.toExponential(2)} Ha/Bohr</span></div>
    </div>`;
  }

  document.getElementById('results-data').innerHTML = html;
  document.getElementById('results-empty').style.display = 'none';
  document.getElementById('results-data').style.display  = 'block';
}

/* ═══════════════════════════════════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════════════════════════════════ */
function showTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATUS
═══════════════════════════════════════════════════════════════════════════ */
function setStatus(state, text) {
  const b = document.getElementById('status-badge');
  b.className  = `badge badge-${state}`;
  b.textContent = text;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════════════════════════════════ */
async function loadFromAPI() {
  setStatus('running', 'Loading…');
  try {
    const res  = await fetch('/api/data');
    const data = await res.json();
    applyData(data);
    setStatus('done', 'Loaded');
  } catch (e) {
    setStatus('error', 'Load error');
    const el = document.getElementById('error-log');
    el.textContent = String(e);
    el.style.display = 'block';
  }
}

function applyData(data) {
  const {level, basis, molecule, scf, mp2, casscf, geopt, freq,
         point_group, calculation_type, log_file} = data;

  // Populate info panel
  const rows = [
    log_file        && ['file',  log_file],
    calculation_type && ['type',  calculation_type],
    level           && ['level', level],
    basis           && ['basis', basis.toUpperCase()],
    point_group     && ['group', point_group],
  ].filter(Boolean);
  document.getElementById('log-info').innerHTML = rows
    .map(([k,v]) => `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${escHtml(v)}</span></div>`)
    .join('');

  // Molecule viewer
  if (molecule && molecule.coords_ang && molecule.coords_ang.length) {
    const atoms = molecule.coords_ang.map((c, i) => ({
      symbol: molecule.symbols[i], x: c[0], y: c[1], z: c[2]
    }));
    setMolecule(atoms, molecule.bonds, molecule.hbonds);
  }

  // SCF chart
  if (scf && scf.energy_history && scf.energy_history.length > 0) {
    renderSCFChart(scf);
    showTab('scf', document.querySelector('[data-tab="scf"]'));
  }

  // Orbital chart (only if data available)
  const hasOrb = scf && scf.orbital_energies && scf.orbital_energies.length > 0;
  document.getElementById('btn-tab-orb').style.display = hasOrb ? '' : 'none';
  if (hasOrb) renderOrbChart(scf, level);

  // CASSCF chart
  const hasCAS = casscf && casscf.energy_history && casscf.energy_history.length > 0;
  document.getElementById('btn-tab-casscf').style.display = hasCAS ? '' : 'none';
  if (hasCAS) {
    renderCASChart(casscf);
    showTab('casscf', document.querySelector('[data-tab="casscf"]'));
  }

  // Geopt chart
  document.getElementById('btn-tab-geopt').style.display = geopt ? '' : 'none';
  if (geopt) renderGeoptChart(geopt);

  // Vibrations
  document.getElementById('btn-tab-vib').style.display = freq ? '' : 'none';
  if (freq) {
    renderVibPanel(freq);
    showTab('vib', document.querySelector('[data-tab="vib"]'));
  }

  renderResults(data);
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════════ */
setupPanelResize();
initViewer();
loadFromAPI();
</script>
</body>
</html>
